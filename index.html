<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner App</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Itim';background:#f9f9f9;}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#ffd6e0;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
}

.day{
  background:white;
  border-radius:15px;
  aspect-ratio:1/1;
  position:relative;
  overflow:hidden;
}

/* IMAGE LAYER */
.bg-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.day *{
  position:relative;
  z-index:2;
}

.date{
  position:absolute;
  bottom:-10px;
  right:-10px;
  font-size:120px;
  color:#0002;
}

.dots{
  position:absolute;
  bottom:5px;
  left:5px;
  right:5px;
  display:flex;
  flex-direction:column;
  gap:2px;
}

.event-box{
  font-size:12px;
  padding:2px 6px;
  border-radius:8px;
  color:#fff;
}

#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="changeMonth(-1)">◀</button>
  <div id="monthYear"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<!-- POPUP -->
<div id="popup">
<div style="background:white;padding:15px;border-radius:15px;width:90%;max-width:400px;">

<h3>จัดการวัน</h3>

<input type="file" id="imgInput"><br><br>

<textarea id="noteInput" placeholder="โน้ต..."></textarea>

<br><br>
<button onclick="saveAll()">บันทึก</button>
<button onclick="closePopup()">ปิด</button>

</div>
</div>

<script>
const calendar=document.getElementById("calendar");
const monthYear=document.getElementById("monthYear");

let currentDate=new Date();
let selectedKey="";
let data=JSON.parse(localStorage.getItem("plannerData")||"{}");

const thaiDays=["อา","จ","อ","พ","พฤ","ศ","ส"];
const thaiMonths=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

/* 🔥 FIX KEY FUNCTION */
function makeKey(y,m,d){
return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

/* CALENDAR */
function renderCalendar(){
calendar.innerHTML="";

let y=currentDate.getFullYear();
let m=currentDate.getMonth();

monthYear.innerText=thaiMonths[m]+" "+(y+543);

let lastDay=new Date(y,m+1,0).getDate();

for(let i=1;i<=lastDay;i++){

let key=makeKey(y,m,i);

let box=document.createElement("div");
box.className="day";

box.innerHTML=`
<div>${thaiDays[new Date(y,m,i).getDay()]}</div>
<div class="date">${i}</div>
<div class="dots"></div>
`;

box.onclick=()=>{
selectedKey=key;
openPopup();
};

calendar.appendChild(box);

/* 🔥 IMAGE FIX (ชัวร์สุด) */
if(data[key]?.img){
let img=document.createElement("img");
img.className="bg-img";
img.src=data[key].img;
box.prepend(img);
}
}
}

/* MONTH */
function changeMonth(x){
currentDate.setMonth(currentDate.getMonth()+x);
renderCalendar();
}

/* POPUP */
function openPopup(){
popup.style.display="flex";

noteInput.value=data[selectedKey]?.note||"";
}

/* CLOSE */
function closePopup(){
popup.style.display="none";
}

/* IMAGE UPLOAD 🔥 FIX 100% */
imgInput.onchange=e=>{
let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();
reader.onload=ev=>{

if(!data[selectedKey]) data[selectedKey]={};

data[selectedKey].img=ev.target.result;

localStorage.setItem("plannerData",JSON.stringify(data));

renderCalendar();
};

reader.readAsDataURL(file);
};

/* SAVE */
function saveAll(){
if(!data[selectedKey]) data[selectedKey]={};

data[selectedKey].note=noteInput.value;

localStorage.setItem("plannerData",JSON.stringify(data));

renderCalendar();
closePopup();
}

renderCalendar();
</script>

</body>
</html>
